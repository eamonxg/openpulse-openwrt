name: Build OpenWrt Packages

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.arch }}-${{ matrix.release }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release: [24.10.6, master]
        arch:
          - aarch64_cortex-a53
          - aarch64_generic
          - x86_64
          - mipsel_24kc
          - mips_24kc
          - arm_cortex-a7_neon-vfpv4

    steps:
      - uses: actions/checkout@v4

      - name: Build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.release }}
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          FEED_DIR: ${{ github.workspace }}
          PACKAGES: pulse-server
          V: s

      - uses: actions/upload-artifact@v4
        with:
          name: pulse-server-${{ matrix.arch }}-${{ matrix.release }}
          path: |
            artifacts/bin/packages/${{ matrix.arch }}/**/*.ipk
            artifacts/bin/packages/${{ matrix.arch }}/**/*.apk
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          name: pulse-server-${{ github.ref_name }}
          files: dist/**/*.[ai]pk
