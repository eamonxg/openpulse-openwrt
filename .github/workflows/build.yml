name: Build OpenWrt Packages

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

# Binary variants committed in openpulse-server/bins/<binary_id>/openpulse-server.
# To update binaries: build locally with cargo-zigbuild and commit the new files.
# See README.md for instructions.

jobs:
  # =========================================================================
  # Package: per-OpenWrt-arch .ipk builds. Each job copies the matching
  # pre-built binary from bins/ and runs openwrt/gh-action-sdk.
  # 14 OpenWrt arches × 2 OpenWrt releases = 28 jobs.
  # =========================================================================
  build-openwrt-package:
    name: ${{ matrix.platform }}-${{ matrix.release }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        release: ["24.10.6", master]
        platform:
          # ---- aarch64 family ----
          - aarch64_generic
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          # ---- x86_64 ----
          - x86_64
          # ---- ARMv7 family — one binary fans out to 9 platforms ----
          - arm_cortex-a7
          - arm_cortex-a7_vfpv4
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a5_vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_vfpv3-d16
          - arm_cortex-a9_neon
          - arm_cortex-a15_neon-vfpv4
        include:
          # binary_id is merged into all (release, platform) combinations
          # where platform matches — giving 14×2 = 28 jobs total.
          - { platform: aarch64_generic,       binary_id: aarch64-generic    }
          - { platform: aarch64_cortex-a53,    binary_id: aarch64-cortex-a53 }
          - { platform: aarch64_cortex-a72,    binary_id: aarch64-cortex-a72 }
          - { platform: aarch64_cortex-a76,    binary_id: aarch64-cortex-a76 }
          - { platform: x86_64,                binary_id: x86_64             }
          - { platform: arm_cortex-a7,         binary_id: armv7-baseline     }
          - { platform: arm_cortex-a7_vfpv4,   binary_id: armv7-baseline     }
          - { platform: arm_cortex-a7_neon-vfpv4, binary_id: armv7-baseline  }
          - { platform: arm_cortex-a5_vfpv4,   binary_id: armv7-baseline     }
          - { platform: arm_cortex-a8_vfpv3,   binary_id: armv7-baseline     }
          - { platform: arm_cortex-a9,         binary_id: armv7-baseline     }
          - { platform: arm_cortex-a9_vfpv3-d16, binary_id: armv7-baseline   }
          - { platform: arm_cortex-a9_neon,    binary_id: armv7-baseline     }
          - { platform: arm_cortex-a15_neon-vfpv4, binary_id: armv7-baseline }

    steps:
      - name: Checkout openpulse-openwrt feed
        uses: actions/checkout@v4

      - name: Place binary into package prebuilt-bin/ directory
        run: |
          mkdir -p openpulse-server/prebuilt-bin
          install -m 0755 \
            openpulse-server/bins/${{ matrix.binary_id }}/openpulse-server \
            openpulse-server/prebuilt-bin/openpulse-server
          echo "--- prebuilt binary ---"
          file openpulse-server/prebuilt-bin/openpulse-server
          ls -lh openpulse-server/prebuilt-bin/openpulse-server

      - name: Create artifacts directory
        run: mkdir -p ${{ github.workspace }}/artifacts

      - name: Build .ipk via OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.platform }}-${{ matrix.release }}
          ARTIFACTS_DIR: ${{ github.workspace }}/artifacts
          FEED_DIR: ${{ github.workspace }}
          PACKAGES: openpulse-server
          V: s

      - name: List artifacts directory
        run: find ${{ github.workspace }}/artifacts -type f 2>/dev/null || echo "artifacts dir empty"

      - name: Rename .apk to include platform (apk format omits arch in filename)
        run: |
          find ${{ github.workspace }}/artifacts -name '*.apk' | while read f; do
            dir=$(dirname "$f")
            base=$(basename "$f" .apk)
            mv "$f" "${dir}/${base}-${{ matrix.platform }}.apk"
          done

      - name: Upload .ipk artifact
        uses: actions/upload-artifact@v4
        with:
          name: openpulse-server-${{ matrix.platform }}-${{ matrix.release }}
          path: artifacts/**/openpulse-server*.[ai]pk
          if-no-files-found: error

  # =========================================================================
  # Release: gather every .ipk/.apk and publish to GitHub Releases on tag.
  # Release body is fetched from eamonxg/assets at the matching tag path.
  # =========================================================================
  release:
    needs: build-openwrt-package
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          pattern: openpulse-server-*
          path: dist/

      - name: Fetch release changelog from assets repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          BODY_PATH="openpulse-openwrt/docs/changelog/${TAG}.md"
          OUT=".release-body.md"
          if gh api "repos/eamonxg/assets/contents/${BODY_PATH}" --jq '.content' \
              | base64 -d > "$OUT" 2>/dev/null && [ -s "$OUT" ]; then
            echo "Loaded changelog for ${TAG}"
          else
            echo "No changelog found for ${TAG}, using empty body" >&2
            : > "$OUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: openpulse-server-${{ github.ref_name }}
          body_path: .release-body.md
          draft: false
          prerelease: false
          files: dist/**/*.[ai]pk
